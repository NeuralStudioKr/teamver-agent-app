version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ta-postgres
    environment:
      POSTGRES_DB: teamver_agent
      POSTGRES_USER: teamver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ta_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5434:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teamver -d teamver_agent']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ta-backend
    ports:
      - '3101:3001'
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=postgresql://teamver:${POSTGRES_PASSWORD:-ta_dev_password}@postgres:5432/teamver_agent
      - AI_RESPONSE_TIMEOUT_MS=${AI_RESPONSE_TIMEOUT_MS:-10000}
      - AI_RANDOM_RESPONSE_CHANCE=${AI_RANDOM_RESPONSE_CHANCE:-0}
      - EXTERNAL_BOTS_ENABLED=${EXTERNAL_BOTS_ENABLED:-true}
      # --- 고객사 식별 (DB seed가 사용) ---
      - WORKSPACE_NAME=${WORKSPACE_NAME:-NeuralStudio}
      - WORKSPACE_SLUG=${WORKSPACE_SLUG:-default}
      - BOT_PASSWORD=${BOT_PASSWORD:?BOT_PASSWORD must be set in .env}
      # --- 3 AI 직원 정체성 (DB seed에서 upsert) ---
      - AI_COORDINATOR_NAME=${AI_COORDINATOR_NAME:-이대표}
      - AI_COORDINATOR_EMAIL=${AI_COORDINATOR_EMAIL:-ceo@teamver.ai}
      - AI_COORDINATOR_TITLE=${AI_COORDINATOR_TITLE:-대표}
      - AI_WRITER_NAME=${AI_WRITER_NAME:-한이사}
      - AI_WRITER_EMAIL=${AI_WRITER_EMAIL:-director@teamver.ai}
      - AI_WRITER_TITLE=${AI_WRITER_TITLE:-이사}
      - AI_REVIEWER_NAME=${AI_REVIEWER_NAME:-이본부장}
      - AI_REVIEWER_EMAIL=${AI_REVIEWER_EMAIL:-chief@teamver.ai}
      - AI_REVIEWER_TITLE=${AI_REVIEWER_TITLE:-본부장}
      - SLACK_BRIDGE_TOKEN=${SLACK_BRIDGE_TOKEN:-}
      - SLACK_BRIDGE_CHANNEL_ID=${SLACK_BRIDGE_CHANNEL_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # === AI 직원 3명 ===
  # 슬롯: coordinator(조율자) / writer(작성자) / reviewer(검수자)
  # 각 슬롯 UUID는 고정. 사람-정체성(이름·직함·이메일)·모델·맞춤 프롬프트는 .env로 주입.

  ai-coordinator:
    build: ./openclaw-bot
    container_name: ta-ai-coordinator
    environment:
      - TEAMVER_URL=http://backend:3001
      - BOT_ID=00000000-0000-0000-0000-000000000001
      - BOT_ROLE=coordinator
      - BOT_EMAIL=${AI_COORDINATOR_EMAIL:-ceo@teamver.ai}
      - BOT_PASSWORD=${BOT_PASSWORD:?BOT_PASSWORD must be set in .env}
      - BOT_NAME=${AI_COORDINATOR_NAME:-이대표}
      - BOT_TITLE=${AI_COORDINATOR_TITLE:-대표}
      - MENTION_TRIGGER=${AI_COORDINATOR_NAME:-이대표}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${AI_COORDINATOR_MODEL:-anthropic/claude-haiku-4-5}
      - BOT_CUSTOM_PROMPT=${AI_COORDINATOR_CUSTOM_PROMPT:-}
    depends_on:
      - backend
    restart: unless-stopped

  ai-writer:
    build: ./openclaw-bot
    container_name: ta-ai-writer
    environment:
      - TEAMVER_URL=http://backend:3001
      - BOT_ID=00000000-0000-0000-0000-000000000002
      - BOT_ROLE=writer
      - BOT_EMAIL=${AI_WRITER_EMAIL:-director@teamver.ai}
      - BOT_PASSWORD=${BOT_PASSWORD:?BOT_PASSWORD must be set in .env}
      - BOT_NAME=${AI_WRITER_NAME:-한이사}
      - BOT_TITLE=${AI_WRITER_TITLE:-이사}
      - MENTION_TRIGGER=${AI_WRITER_NAME:-한이사}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${AI_WRITER_MODEL:-anthropic/claude-haiku-4-5}
      - BOT_CUSTOM_PROMPT=${AI_WRITER_CUSTOM_PROMPT:-}
    depends_on:
      - backend
    restart: unless-stopped

  ai-reviewer:
    build: ./openclaw-bot
    container_name: ta-ai-reviewer
    environment:
      - TEAMVER_URL=http://backend:3001
      - BOT_ID=00000000-0000-0000-0000-000000000003
      - BOT_ROLE=reviewer
      - BOT_EMAIL=${AI_REVIEWER_EMAIL:-chief@teamver.ai}
      - BOT_PASSWORD=${BOT_PASSWORD:?BOT_PASSWORD must be set in .env}
      - BOT_NAME=${AI_REVIEWER_NAME:-이본부장}
      - BOT_TITLE=${AI_REVIEWER_TITLE:-본부장}
      - MENTION_TRIGGER=${AI_REVIEWER_NAME:-이본부장}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${AI_REVIEWER_MODEL:-anthropic/claude-haiku-4-5}
      - BOT_CUSTOM_PROMPT=${AI_REVIEWER_CUSTOM_PROMPT:-}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3101}
    container_name: ta-frontend
    ports:
      - '3100:3000'
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3101}
    restart: unless-stopped

volumes:
  postgres_data:
    name: ta-postgres-data

networks:
  default:
    name: ta-network
