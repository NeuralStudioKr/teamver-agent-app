version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ta-postgres
    environment:
      POSTGRES_DB: teamver_agent
      POSTGRES_USER: teamver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ta_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teamver -d teamver_agent']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ta-backend
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://teamver:${POSTGRES_PASSWORD:-ta_dev_password}@postgres:5432/teamver_agent
      - AI_RESPONSE_TIMEOUT_MS=${AI_RESPONSE_TIMEOUT_MS:-10000}
      - AI_RANDOM_RESPONSE_CHANCE=${AI_RANDOM_RESPONSE_CHANCE:-0.2}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: ta-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped

volumes:
  postgres_data:
    name: ta-postgres-data

networks:
  default:
    name: ta-network
